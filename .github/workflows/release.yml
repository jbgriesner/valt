name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.3)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: valt
            archive: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            bin: valt
            archive: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: valt.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build .deb
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-deb --locked
          cargo deb --target ${{ matrix.target }} --no-build
          DEB=$(ls target/${{ matrix.target }}/debian/*.deb)
          echo "DEB_ASSET=$DEB" >> "$GITHUB_ENV"

      - name: Upload .deb to release
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.DEB_ASSET }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="valt-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${{ matrix.bin }}"
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/${{ matrix.bin }}"
          $archive = "valt-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary -DestinationPath $archive
          "ASSET=$archive" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.ASSET }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}

  homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets and compute sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          VER="${TAG#v}"
          echo "VERSION=${VER}" >> "$GITHUB_ENV"

          for spec in \
            "x86_64-unknown-linux-gnu:SHA256_LINUX" \
            "aarch64-apple-darwin:SHA256_MACOS_ARM"; do
            TARGET="${spec%%:*}"
            VAR="${spec##*:}"
            ASSET="valt-${TAG}-${TARGET}.tar.gz"
            gh release download "${TAG}" --pattern "${ASSET}"
            SHA=$(sha256sum "${ASSET}" | cut -d' ' -f1)
            echo "${VAR}=${SHA}" >> "$GITHUB_ENV"
          done

      - name: Generate formula from template
        run: |
          sed \
            -e "s/@@VERSION@@/${{ env.VERSION }}/g" \
            -e "s/@@SHA256_LINUX@@/${{ env.SHA256_LINUX }}/g" \
            -e "s/@@SHA256_MACOS_ARM@@/${{ env.SHA256_MACOS_ARM }}/g" \
            packaging/homebrew/valt.rb.tmpl > valt.rb

      - name: Push formula to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/jbgriesner/homebrew-valt.git" tap
          mkdir -p tap/Formula
          cp valt.rb tap/Formula/valt.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/valt.rb
          git diff --cached --quiet || git commit -m "valt ${{ env.VERSION }}"
          git push

  aur:
    name: Update AUR package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux asset and compute sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          VER="${TAG#v}"
          echo "VERSION=${VER}" >> "$GITHUB_ENV"
          ASSET="valt-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "${TAG}" --pattern "${ASSET}"
          SHA=$(sha256sum "${ASSET}" | cut -d' ' -f1)
          echo "SHA256_LINUX=${SHA}" >> "$GITHUB_ENV"

      - name: Generate PKGBUILD from template
        run: |
          sed \
            -e "s/@@VERSION@@/${{ env.VERSION }}/g" \
            -e "s/@@SHA256_LINUX@@/${{ env.SHA256_LINUX }}/g" \
            packaging/aur/PKGBUILD.tmpl > PKGBUILD

      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.0
        with:
          pkgname: valt-bin
          pkgbuild: ./PKGBUILD
          commit_username: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.VERSION }}"
          allow_empty_commits: false
